
############# Log File Parsing #############

protocols:
  - fasp-aspera
  - gridftp-globus
  - http
  - ftp
public_private:
  - public
resource_identifiers:
  - /pub/databases/metabolights/studies/
accession_pattern:
  - 'MTBLS\\d{4}'
  - 'MTBLS\\d{5}'
completeness:
  - complete
############# Statistics Reports #############

report_template: "metab_report.html"
skipped_years:
  - 2020
  - 2025
resource_base_url: 'https://www.ebi.ac.uk/metabolights/editor/'
report_copy_filepath:

############# Push to a Database(e.g MongoDB) #############
disable_db_update: true
log_file_batch_size: 1000
chunk_size: 100000